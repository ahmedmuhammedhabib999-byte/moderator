services:
  - type: web
    name: modforge-backend
    env: python
    branch: main
    root: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: modforge-postgres
          property: connectionString
      - key: OPENAI_API_KEY
        fromSecret: OPENAI_API_KEY
      - key: SECRET_KEY
        fromSecret: SECRET_KEY
      - key: CORS_ALLOWED_ORIGINS
        value: "*"

  - type: pserv
    name: modforge-postgres
    ipAllowList: []
    plan: starter
    postgresVersion: "15"

  - type: web
    name: modforge-frontend
    env: node
    branch: main
    root: .
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: "https://modforge-backend.onrender.com/api/v1"
